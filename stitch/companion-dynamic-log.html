<style>
        body {
            background: linear-gradient(to bottom, #FFEE91 0%, #F5C857 50%, #ABE0F0 100%);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .apply-btn:active:not(:disabled) {
            transform: scale(0.97);
            background-color: rgba(226, 133, 46, 0.15);
        }
        .apply-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Animated Sun Styles */
        @keyframes sun-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .sun-animation-container {
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .sun-core {
            width: 44px;
            height: 44px;
            background-color: #E2852E;
            border-radius: 50%;
            z-index: 2;
        }

        .sun-rays-container {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: sun-rotate 15s linear infinite;
        }

        .sun-ray {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 110px;
            background-color: #E2852E;
            margin-left: -4px;
            margin-top: -55px;
            border-radius: 4px;
        }

        .sun-ray:nth-child(2) { transform: rotate(45deg); }
        .sun-ray:nth-child(3) { transform: rotate(90deg); }
        .sun-ray:nth-child(4) { transform: rotate(135deg); }

        /* Animation for new log entries */
        @keyframes fadeInDown {
            0% {
                opacity: 0;
                transform: translateY(-10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-down {
            animation: fadeInDown 200ms ease-out forwards;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen text-sun-orange">
<!-- Top Navigation -->
<header class="w-full top-0 left-0 sticky bg-transparent flex items-center justify-between px-padding-phone-x h-16 w-full z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sun-orange" data-icon="light_mode">light_mode</span>
<h1 class="font-headline-lg text-headline-lg font-semibold text-sun-orange">SunGuard</h1>
</div>
</header>
<main class="flex-grow flex flex-col items-center pt-12 pb-20 px-padding-phone-x">
<!-- Hero Section -->
<div class="mb-hero-gap flex flex-col items-center w-full">
<div class="w-[120px] h-[120px] mb-8">
<!-- Hero Icon Replacement: Animated Sun -->
<div class="sun-animation-container">
<div class="sun-rays-container">
<div class="sun-ray"></div>
<div class="sun-ray"></div>
<div class="sun-ray"></div>
<div class="sun-ray"></div>
</div>
<div class="sun-core"></div>
</div>
</div>
<!-- Primary Action Button -->
<button class="apply-btn w-1/2 min-w-[140px] h-12 rounded-full border-[1.5px] border-sun-orange bg-transparent font-apply-button text-apply-button text-sun-orange transition-all duration-150 flex items-center justify-center" id="apply-btn">
                Apply
            </button>
</div>
<!-- Stats Row -->
<div class="w-full grid grid-cols-3 gap-stats-gap mt-section-gap mb-section-gap">
<div class="flex flex-col items-center text-center">
<span class="material-symbols-outlined mb-2" data-icon="wb_sunny" style="font-size: 28px;">wb_sunny</span>
<span class="font-stats-value text-stats-value uppercase">8 HIGH</span>
<span class="font-stats-label text-stats-label">Exposure</span>
</div>
<div class="flex flex-col items-center text-center">
<span class="material-symbols-outlined mb-2" data-icon="verified_user" style="font-size: 28px;">verified_user</span>
<span class="font-stats-value text-stats-value uppercase">SPF 30</span>
<span class="font-stats-label text-stats-label">Recommended SPF</span>
</div>
<div class="flex flex-col items-center text-center">
<span class="material-symbols-outlined mb-2" data-icon="hourglass_empty" style="font-size: 28px;">hourglass_empty</span>
<span class="font-stats-value text-stats-value uppercase" id="last-applied-time">20:10</span>
<span class="font-stats-label text-stats-label">Last Applied</span>
</div>
</div>
<!-- Log Section -->
<div class="w-full flex flex-col items-center mt-8">
<h2 class="mb-4 font-headline-lg text-[16px] font-semibold">Application Log</h2>
<div class="w-2/5 flex flex-col items-center overflow-y-auto max-h-[168px]" id="log-list"><div class="h-log-item-height font-log-entry text-log-entry animate-fade-in-down">20:10</div>
<div class="h-log-item-height font-log-entry text-log-entry">11:00</div>
<div class="h-log-item-height font-log-entry text-log-entry">10:34</div>

<div class="h-log-item-height font-log-entry text-log-entry">4:48</div>
<div class="h-log-item-height font-log-entry text-log-entry">5:42</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full pb-24 flex justify-center items-center text-center px-padding-phone-x mt-section-gap">
<p class="font-footer-tagline text-footer-tagline italic max-w-[80%]">Stay Safe - your summer bestie ☀️ </p>
</footer>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-padding-phone-x pb-8 bg-transparent">
<div class="flex flex-col items-center justify-center text-sun-orange scale-110 cursor-pointer hover:text-sun-orange/80 transition-all">
</div>
<div class="flex flex-col items-center justify-center text-sun-orange/50 cursor-pointer hover:text-sun-orange/80 transition-all">
</div>
<div class="flex flex-col items-center justify-center text-sun-orange/50 cursor-pointer hover:text-sun-orange/80 transition-all">
</div>
</nav>
<script>
        // Micro-interaction and logic for the apply button
        const btn = document.getElementById('apply-btn');
        const logList = document.getElementById('log-list');
        const lastAppliedLabel = document.getElementById('last-applied-time');

        btn.addEventListener('click', () => {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const timeStr = `${hours}:${minutes}`;
            
            // 1. Update text and disable button
            const originalText = "Apply";
            btn.innerHTML = 'Applied!';
            btn.disabled = true;

            // 2. JavaScript timer to reset after 5 seconds
            setTimeout(() => { 
                btn.innerHTML = originalText; 
                btn.disabled = false;
            }, 5000);

            // Update "Last Applied" stat
            lastAppliedLabel.innerText = timeStr;

            // 4. Keep dynamic logging functionality intact
            const newEntry = document.createElement('div');
            newEntry.className = 'h-log-item-height font-log-entry text-log-entry animate-fade-in-down';
            newEntry.innerText = timeStr;
            logList.insertBefore(newEntry, logList.firstChild);

            // Scroll to top of log if needed
            logList.scrollTop = 0;
            
            console.log('Applied at:', timeStr);
        });

        // Atmospheric parallax effect on scroll
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const hero = document.querySelector('.sun-animation-container');
            if(hero) {
                hero.style.transform = `translateY(${scrolled * 0.15}px)`;
            }
        });
    </script>
</body></html>
